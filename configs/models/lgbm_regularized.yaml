model:
  name: lgbm
  batch_size: 4096
  n_jobs: 8

lgbm:
  loss: huber
  learning_rate: 0.05
  num_boost_round: 800
  early_stop: 20
  early_stopping_min_delta: 0.0
  log_evaluation_period: 50
  colsample_bytree: 0.75
  subsample: 0.75
  subsample_freq: 1
  lambda_l1: 2.0
  lambda_l2: 4.0
  max_depth: 6
  num_leaves: 31
  min_data_in_leaf: 200
  num_threads: 8
  seed: 42
