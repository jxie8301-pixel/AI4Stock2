model:
  name: lgbm
  batch_size: 4096
  n_jobs: 8
  early_stop: 10

lgbm:
  loss: huber
  learning_rate: 0.05
  colsample_bytree: 0.8879
  subsample: 0.8789
  subsample_freq: 1
  lambda_l1: 1.0
  lambda_l2: 1.0
  max_depth: 8
  num_leaves: 63
  min_data_in_leaf: 100
  num_threads: 8
  early_stop: 10
