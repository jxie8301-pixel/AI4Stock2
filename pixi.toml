[workspace]
authors = ["RTChou67 <3023207450@tju.edu.cn>"]
channels = ["conda-forge"]
name = "AI4Stock2"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
rust-test = "cargo test"
rust-gen-feature-help = "cargo run --bin ai4stock-gen-feature -- --help"
rust-train-help = "cargo run --bin ai4stock-train -- --help"
test-feature-generation = "pytest tests/test_feature_engine_parity.py tests/test_gen_feature_store.py"

[dependencies]
python = "3.12.*"
cuda-version = "12.9.*"
lightgbm = { version = "==4.6.0", build = "*cuda129*" }
numpy = ">=2.4.3,<3"
pandas = ">=2.3.3,<4"
pyarrow = ">=24.0.0,<25"
pyyaml = ">=6.0.3,<7"
pytest = ">=9.0.3,<10"
scipy = ">=1.17.1,<2"
seaborn = ">=0.13.2,<0.14"
tqdm = ">=4.67.3,<5"
curl-cffi = ">=0.15.0,<0.16"
pytorch = ">=2.10.0,<3"
tabulate = ">=0.10.0,<0.11"
requests = ">=2.33.1,<3"
pip = ">=26.0.1,<27"

[system-requirements]
cuda = "12.9"

[pypi-dependencies]
akshare = ">=1.18.59, <2"
akshare-proxy-patch = ">=0.3.0, <0.4"
tushare = ">=1.4.29, <2"
