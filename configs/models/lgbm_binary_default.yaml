model:
  name: lgbm
  batch_size: 4096
  n_jobs: 24

lgbm:
  loss: binary
  early_stopping_metric: valid_topk_label_mean
  learning_rate: 0.03
  num_boost_round: 1500
  early_stop: 20
  min_boost_round: 50
  early_stopping_min_delta: 0.0
  sample_weight_mode: opportunity_distance
  sample_weight_power: 1.0
  sample_weight_min: 0.25
  sample_weight_date_normalize: true
  log_evaluation_period: 50
  colsample_bytree: 0.8879
  subsample: 0.8789
  subsample_freq: 1
  lambda_l1: 1.0
  lambda_l2: 1.0
  max_depth: 8
  num_leaves: 63
  min_data_in_leaf: 100
  num_threads: 24
  seed: 42
